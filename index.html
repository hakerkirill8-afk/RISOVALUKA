<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🎨 Рисовалка</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        #auth {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }
        #auth .logo { font-size: 48px; margin-bottom: 8px; }
        #auth .sub { color: #8a8aaa; font-size: 16px; margin-bottom: 24px; }
        #auth .field {
            width: 100%;
            max-width: 320px;
            padding: 14px 18px;
            background: #1a1a2e;
            border: 1px solid #2a2a3e;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 10px;
            outline: none;
        }
        #auth .field:focus { border-color: #00ff88; }
        #auth .btn {
            width: 100%;
            max-width: 320px;
            padding: 14px;
            background: #00ff88;
            border: none;
            border-radius: 10px;
            color: #000;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }
        #auth .btn:hover { background: #00cc6a; }
        #authStatus { color: #ff4444; font-size: 14px; margin-top: 10px; }

        #main {
            display: none;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            flex-direction: column;
        }

        .top-panel {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: #1a1a2e;
            border-bottom: 1px solid #2a2a3e;
            flex-shrink: 0;
            flex-wrap: wrap;
            min-height: 44px;
        }
        .top-panel .logo-small { font-size: 18px; font-weight: 700; color: #00ff88; }
        .top-panel .user-name { font-size: 13px; color: #00ff88; font-weight: 600; }
        .top-panel input {
            padding: 4px 10px;
            background: #0a0a0f;
            border: 1px solid #2a2a3e;
            border-radius: 6px;
            color: #fff;
            font-size: 12px;
            outline: none;
            width: 90px;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 1px;
        }
        .top-panel input:focus { border-color: #00ff88; }
        .top-panel input::placeholder { text-transform: none; letter-spacing: 0; color: #555; font-size: 10px; }
        .top-panel button {
            padding: 4px 12px;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
            white-space: nowrap;
        }
        .top-panel button:hover { transform: scale(1.03); filter: brightness(1.2); }
        #createBtn { background: #00ff88; color: #000; }
        #joinBtn { background: #4488ff; color: #fff; }
        #leaveBtn { background: #ff3366; color: #fff; display: none; }
        #roomDisplay {
            color: #8a8aaa;
            font-size: 12px;
            font-weight: 600;
            min-width: 60px;
        }
        #roomDisplay.active { color: #00ff88; }
        #onlineCount { color: #8a8aaa; font-size: 11px; }
        #statusText { color: #8a8aaa; font-size: 11px; }
        .top-panel .sep { color: #2a2a3e; font-size: 16px; }
        #palette { display: flex; gap: 3px; align-items: center; flex-wrap: wrap; }
        .color-btn { width: 20px; height: 20px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: 0.2s; flex-shrink: 0; }
        .color-btn:hover { transform: scale(1.1); }
        .color-btn.active { border-color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.3); }
        #sizeSlider { width: 60px; accent-color: #00ff88; cursor: pointer; flex-shrink: 0; }
        #sizeLabel { font-size: 10px; color: #8a8aaa; min-width: 24px; }
        #clearBtn { background: #ff3366; border: none; color: #fff; padding: 2px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        #clearBtn:hover { filter: brightness(1.2); }

        .main-area {
            display: flex;
            flex: 1;
            min-height: 0;
            height: 100%;
        }

        .canvas-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            background: #0a0a0f;
            position: relative;
            min-height: 0;
            height: 100%;
            overflow: hidden;
        }
        canvas {
            border-radius: 8px;
            cursor: crosshair;
            background: #fff;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        .chat-panel {
            width: 200px;
            min-width: 140px;
            background: #1a1a2e;
            border-left: 1px solid #2a2a3e;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            height: 100%;
        }
        .chat-panel .chat-header {
            padding: 6px 12px;
            border-bottom: 1px solid #2a2a3e;
            font-size: 12px;
            font-weight: 600;
            color: #8a8aaa;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-panel .chat-header span { color: #00ff88; }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 6px 10px;
            font-size: 12px;
            line-height: 1.5;
            min-height: 0;
        }
        .chat-messages::-webkit-scrollbar { width: 3px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #00ff88; border-radius: 2px; }
        .chat-messages .me { color: #00ff88; }
        .chat-messages .other { color: #ff6688; }
        .chat-messages .system { color: #ffaa44; font-style: italic; font-size: 11px; }

        .chat-input-row {
            display: flex;
            gap: 4px;
            padding: 6px 10px 10px;
            border-top: 1px solid #2a2a3e;
            flex-shrink: 0;
        }
        .chat-input-row input {
            flex: 1;
            padding: 4px 10px;
            background: #0a0a0f;
            border: 1px solid #2a2a3e;
            border-radius: 14px;
            color: #fff;
            font-size: 12px;
            outline: none;
            min-width: 0;
        }
        .chat-input-row input:focus { border-color: #00ff88; }
        .chat-input-row input:disabled { opacity: 0.4; cursor: not-allowed; }
        .chat-input-row button {
            padding: 4px 12px;
            background: #00ff88;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            color: #000;
            cursor: pointer;
            font-size: 12px;
            flex-shrink: 0;
        }
        .chat-input-row button:hover:not(:disabled) { background: #00cc6a; }
        .chat-input-row button:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="auth">
        <div class="logo">🎨</div>
        <div class="sub">Введи имя и входи</div>
        <input class="field" id="authUsername" placeholder="Твоё имя">
        <button class="btn" id="authBtn">🚀 Войти</button>
        <div id="authStatus"></div>
        <input class="field" id="serverInput" placeholder="Сервер" value="risovaluka-risovaluka.up.railway.app" style="margin-top:12px;font-size:12px;">
    </div>

    <div id="main">
        <div class="top-panel">
            <span class="logo-small">🎨</span>
            <span class="user-name" id="userNameDisplay">—</span>
            <span class="sep">|</span>
            <input id="roomInput" placeholder="ID" maxlength="10">
            <button id="createBtn">🏠 Создать</button>
            <button id="joinBtn">🔗 Войти</button>
            <button id="leaveBtn">🚪 Выйти</button>
            <span class="sep">|</span>
            <span id="roomDisplay">Нет комнаты</span>
            <span class="sep">|</span>
            <div id="palette"></div>
            <span id="onlineCount">👤 0</span>
            <span id="statusText">✏️ Готов</span>
        </div>

        <div class="main-area">
            <div class="canvas-wrapper">
                <canvas id="canvas"></canvas>
            </div>
            <div class="chat-panel">
                <div class="chat-header"><span>💬 Чат</span><span id="chatUserCount">0</span></div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-row">
                    <input id="chatInput" placeholder="Сообщение..." disabled>
                    <button id="chatSend" disabled>📨</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. КАНВАС
        // ==========================================
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let isDrawing = false;
        let lastX = 0, lastY = 0;
        let currentColor = '#ff3366';
        let brushSize = 3;
        let username = '';
        let currentRoom = null;
        let roomUsers = [];
        let hasDrawn = false;

        // ==========================================
        // 2. РЕСАЙЗ КАНВАСА
        // ==========================================
        function resizeCanvas() {
            const wrapper = document.querySelector('.canvas-wrapper');
            const rect = wrapper.getBoundingClientRect();
            
            canvas.width = rect.width;
            canvas.height = rect.height;
            
            if (!hasDrawn) {
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ddd';
                ctx.font = Math.min(canvas.width, canvas.height) * 0.04 + 'px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('🎨 Рисовалка', canvas.width/2, canvas.height/2 - 20);
                ctx.font = Math.min(canvas.width, canvas.height) * 0.025 + 'px Arial';
                ctx.fillStyle = '#aaa';
                ctx.fillText('Создай комнату и рисуй с друзьями', canvas.width/2, canvas.height/2 + 30);
                ctx.textAlign = 'start';
            }
        }

        window.addEventListener('resize', resizeCanvas);

        // ==========================================
        // 3. ПАЛИТРА
        // ==========================================
        const colors = [
            '#ff3366', '#ff6633', '#ffcc00', '#33ff66',
            '#33ccff', '#3366ff', '#9933ff', '#ff33cc',
            '#ffffff', '#cccccc', '#888888', '#333333'
        ];

        function createPalette() {
            const palette = document.getElementById('palette');
            palette.innerHTML = '';
            
            colors.forEach(color => {
                const btn = document.createElement('div');
                btn.className = 'color-btn' + (color === currentColor ? ' active' : '');
                btn.style.background = color;
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentColor = color;
                });
                palette.appendChild(btn);
            });

            const sizeSlider = document.createElement('input');
            sizeSlider.id = 'sizeSlider';
            sizeSlider.type = 'range';
            sizeSlider.min = 1;
            sizeSlider.max = 20;
            sizeSlider.value = 3;
            sizeSlider.style.cssText = 'width:60px;accent-color:#00ff88;cursor:pointer;flex-shrink:0;';
            sizeSlider.addEventListener('input', () => {
                brushSize = parseInt(sizeSlider.value);
                document.getElementById('sizeLabel').textContent = brushSize + 'px';
            });
            palette.appendChild(sizeSlider);

            const sizeLabel = document.createElement('span');
            sizeLabel.id = 'sizeLabel';
            sizeLabel.style.cssText = 'font-size:10px;color:#8a8aaa;min-width:24px;';
            sizeLabel.textContent = '3px';
            palette.appendChild(sizeLabel);

            const clearBtn = document.createElement('button');
            clearBtn.id = 'clearBtn';
            clearBtn.textContent = '🗑️';
            clearBtn.style.cssText = 'background:#ff3366;border:none;color:#fff;padding:2px 10px;border-radius:6px;cursor:pointer;font-size:12px;';
            clearBtn.addEventListener('click', () => {
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                hasDrawn = false;
                if (ws && ws.readyState === WebSocket.OPEN && currentRoom) {
                    ws.send(JSON.stringify({ type: 'clear', room: currentRoom }));
                }
            });
            palette.appendChild(clearBtn);
        }

        // ==========================================
        // 4. РИСОВАНИЕ
        // ==========================================
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            const x = (clientX - rect.left) * scaleX;
            const y = (clientY - rect.top) * scaleY;
            return { x: Math.min(canvas.width, Math.max(0, x)), y: Math.min(canvas.height, Math.max(0, y)) };
        }

        function startDrawing(e) {
            e.preventDefault();
            if (!currentRoom) return;
            isDrawing = true;
            const pos = getPos(e);
            lastX = pos.x;
            lastY = pos.y;
        }

        function draw(e) {
            e.preventDefault();
            if (!isDrawing || !currentRoom) return;
            const pos = getPos(e);

            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = brushSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
            hasDrawn = true;

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'draw',
                    room: currentRoom,
                    x1: lastX, y1: lastY,
                    x2: pos.x, y2: pos.y,
                    color: currentColor,
                    size: brushSize
                }));
            }

            lastX = pos.x;
            lastY = pos.y;
        }

        function stopDrawing() { isDrawing = false; }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        document.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        document.addEventListener('touchend', stopDrawing);

        // ==========================================
        // 5. ВЕБСОКЕТ (С ПОДДЕРЖКОЙ wss://)
        // ==========================================
        let ws = null;
        let connected = false;

        function connectWebSocket(addr) {
            return new Promise((resolve, reject) => {
                try {
                    // Автоматически определяем протокол (wss:// для Railway)
                    let protocol = 'ws://';
                    if (window.location.protocol === 'https:' || addr.includes('railway.app')) {
                        protocol = 'wss://';
                    }
                    
                    const wsUrl = protocol + addr;
                    console.log('🔗 Подключение к:', wsUrl);
                    
                    ws = new WebSocket(wsUrl);
                    ws.onopen = () => {
                        console.log('🟢 WebSocket подключен');
                        resolve();
                    };
                    ws.onerror = (err) => {
                        console.log('🔴 WebSocket ошибка:', err);
                        reject(err);
                    };
                    ws.onclose = () => {
                        connected = false;
                        setStatus('❌ Соединение потеряно', '#ff3366');
                        console.log('🔴 WebSocket закрыт');
                    };
                    ws.onmessage = (e) => {
                        try { handleMessage(JSON.parse(e.data)); }
                        catch(err) { console.log('Parse error:', err); }
                    };
                } catch(e) {
                    reject(e);
                }
            });
        }

        function handleMessage(data) {
            switch(data.type) {
                case 'connected':
                    connected = true;
                    setStatus('✅ Подключено!', '#00ff88');
                    document.getElementById('userNameDisplay').textContent = username;
                    document.getElementById('auth').style.display = 'none';
                    document.getElementById('main').style.display = 'flex';
                    document.getElementById('onlineCount').textContent = '👤 1';
                    createPalette();
                    setTimeout(resizeCanvas, 50);
                    break;

                case 'error':
                    setStatus('❌ ' + data.message, '#ff3366');
                    break;

                case 'room_created':
                case 'room_joined':
                    currentRoom = data.room_id;
                    roomUsers = data.users || [];
                    if (!roomUsers.includes(username)) {
                        roomUsers.push(username);
                    }
                    document.getElementById('roomDisplay').textContent = '🏠 ' + currentRoom;
                    document.getElementById('roomDisplay').className = 'active';
                    document.getElementById('leaveBtn').style.display = 'inline-block';
                    document.getElementById('chatInput').disabled = false;
                    document.getElementById('chatSend').disabled = false;
                    document.getElementById('chatUserCount').textContent = roomUsers.length;
                    document.getElementById('onlineCount').textContent = '👤 ' + roomUsers.length;
                    setStatus('🎨 Рисуй!', '#00ff88');
                    break;

                case 'room_left':
                    currentRoom = null;
                    roomUsers = [];
                    document.getElementById('roomDisplay').textContent = 'Нет комнаты';
                    document.getElementById('roomDisplay').className = '';
                    document.getElementById('leaveBtn').style.display = 'none';
                    document.getElementById('chatInput').disabled = true;
                    document.getElementById('chatSend').disabled = true;
                    document.getElementById('chatUserCount').textContent = '0';
                    document.getElementById('onlineCount').textContent = '👤 0';
                    setStatus('✏️ Готов', '#8a8aaa');
                    break;

                case 'user_joined':
                case 'user_left':
                    roomUsers = data.users || [];
                    if (currentRoom && !roomUsers.includes(username)) {
                        roomUsers.push(username);
                    }
                    document.getElementById('chatUserCount').textContent = roomUsers.length;
                    document.getElementById('onlineCount').textContent = '👤 ' + roomUsers.length;
                    addChatMessage('🔄 ' + data.username + (data.type === 'user_joined' ? ' присоединился' : ' вышел'), 'system');
                    break;

                case 'draw':
                    ctx.beginPath();
                    ctx.moveTo(data.x1, data.y1);
                    ctx.lineTo(data.x2, data.y2);
                    ctx.strokeStyle = data.color;
                    ctx.lineWidth = data.size;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.stroke();
                    hasDrawn = true;
                    break;

                case 'clear':
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    hasDrawn = false;
                    addChatMessage('🗑️ ' + data.from + ' очистил холст', 'system');
                    break;

                case 'chat':
                    addChatMessage('💬 ' + data.from + ': ' + data.text, data.from === username ? 'me' : 'other');
                    break;

                case 'room_update':
                    roomUsers = data.users || [];
                    if (currentRoom && !roomUsers.includes(username)) {
                        roomUsers.push(username);
                    }
                    document.getElementById('chatUserCount').textContent = roomUsers.length;
                    document.getElementById('onlineCount').textContent = '👤 ' + roomUsers.length;
                    break;
            }
        }

        function setStatus(text, color = '#8a8aaa') {
            document.getElementById('statusText').textContent = text;
            document.getElementById('statusText').style.color = color;
        }

        // ==========================================
        // 6. АВТОРИЗАЦИЯ
        // ==========================================
        document.getElementById('authBtn').addEventListener('click', async () => {
            const name = document.getElementById('authUsername').value.trim();
            if (!name) {
                document.getElementById('authStatus').textContent = 'Введи имя!';
                return;
            }
            username = name;
            const server = document.getElementById('serverInput').value.trim() || 'risovaluka-risovaluka.up.railway.app';

            document.getElementById('authStatus').textContent = 'Подключение...';
            document.getElementById('authBtn').disabled = true;

            try {
                await connectWebSocket(server);
                ws.send(JSON.stringify({ type: 'join', username: username }));
                document.getElementById('authBtn').disabled = false;
            } catch(e) {
                document.getElementById('authStatus').textContent = '❌ Ошибка: ' + e.message;
                document.getElementById('authBtn').disabled = false;
            }
        });

        document.getElementById('authUsername').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('authBtn').click();
        });

        // ==========================================
        // 7. КОМНАТЫ
        // ==========================================
        document.getElementById('createBtn').addEventListener('click', () => {
            const roomId = document.getElementById('roomInput').value.trim().toUpperCase();
            if (!roomId) { alert('Введите ID комнаты!'); return; }
            if (!ws || ws.readyState !== WebSocket.OPEN) { alert('Нет соединения!'); return; }
            ws.send(JSON.stringify({ type: 'create_room', room_id: roomId }));
        });

        document.getElementById('joinBtn').addEventListener('click', () => {
            const roomId = document.getElementById('roomInput').value.trim().toUpperCase();
            if (!roomId) { alert('Введите ID комнаты!'); return; }
            if (!ws || ws.readyState !== WebSocket.OPEN) { alert('Нет соединения!'); return; }
            ws.send(JSON.stringify({ type: 'join_room', room_id: roomId }));
        });

        document.getElementById('leaveBtn').addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN && currentRoom) {
                ws.send(JSON.stringify({ type: 'leave_room' }));
            }
        });

        document.getElementById('roomInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('createBtn').click();
        });

        // ==========================================
        // 8. ЧАТ
        // ==========================================
        function addChatMessage(text, className = 'system') {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = className;
            div.textContent = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            if (container.children.length > 100) {
                container.removeChild(container.firstChild);
            }
        }

        document.getElementById('chatSend').addEventListener('click', () => {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text || !currentRoom || !ws) return;
            addChatMessage('💬 Я: ' + text, 'me');
            ws.send(JSON.stringify({ type: 'chat', room: currentRoom, text: text }));
            input.value = '';
        });

        document.getElementById('chatInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('chatSend').click();
        });

        // ==========================================
        // 9. ЗАПУСК
        // ==========================================
        setTimeout(resizeCanvas, 50);
        console.log('🎨 Рисовалка запущена!');
        console.log('🌐 Сервер: risovaluka-risovaluka.up.railway.app');
        console.log('1. Введи имя → Войти');
        console.log('2. Введи ID → Создать');
        console.log('3. Друг вводит тот же ID → Войти');
    </script>
</body>
</html>
