<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎨 Рисовалка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            background: #0a0a1a;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            touch-action: none;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
        }

        #auth {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }
        #auth .logo { font-size: 52px; margin-bottom: 8px; }
        #auth .sub { color: #8a8aaa; font-size: 16px; margin-bottom: 24px; }
        #auth .field {
            width: 100%;
            max-width: 320px;
            padding: 16px 18px;
            background: #1a1a2e;
            border: 1px solid #2a2a3e;
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
            margin-bottom: 10px;
            outline: none;
        }
        #auth .field:focus { border-color: #00ff88; }
        #auth .btn {
            width: 100%;
            max-width: 320px;
            padding: 16px;
            background: #00ff88;
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
        }
        #auth .btn:active { transform: scale(0.96); }
        #authStatus { color: #ff4444; font-size: 14px; margin-top: 10px; min-height: 24px; }

        #main {
            display: none;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            touch-action: none;
        }

        /* ===== МЕНЮ ===== */
        .top-panel {
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            background: #1a1a2e;
            border-bottom: 1px solid #2a2a3e;
            padding: 4px 10px;
            gap: 4px;
        }

        .row-1 {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .row-1 .logo-small {
            font-size: 16px;
            font-weight: 700;
            color: #00ff88;
            flex-shrink: 0;
        }
        .row-1 .user-name {
            font-size: 12px;
            color: #00ff88;
            font-weight: 600;
            flex-shrink: 0;
        }
        .row-1 .sep {
            color: #2a2a3e;
            font-size: 16px;
            flex-shrink: 0;
        }
        .row-1 input {
            padding: 4px 8px;
            background: #0a0a0f;
            border: 1px solid #2a2a3e;
            border-radius: 6px;
            color: #fff;
            font-size: 11px;
            outline: none;
            width: 60px;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 1px;
            flex-shrink: 0;
        }
        .row-1 input:focus { border-color: #00ff88; }
        .row-1 input::placeholder {
            text-transform: none;
            letter-spacing: 0;
            color: #555;
            font-size: 9px;
        }
        .row-1 button {
            padding: 4px 12px;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            font-size: 11px;
            white-space: nowrap;
            flex-shrink: 0;
            min-height: 28px;
        }
        .row-1 button:active { transform: scale(0.92); }
        #createBtn { background: #00ff88; color: #000; }
        #joinBtn { background: #4488ff; color: #fff; }
        #leaveBtn { background: #ff3366; color: #fff; display: none; }
        #roomDisplay {
            color: #8a8aaa;
            font-size: 11px;
            font-weight: 600;
            min-width: 40px;
            flex-shrink: 0;
        }
        #roomDisplay.active { color: #00ff88; }
        #onlineCount {
            color: #8a8aaa;
            font-size: 10px;
            flex-shrink: 0;
        }
        #statusText {
            color: #8a8aaa;
            font-size: 10px;
            flex-shrink: 0;
        }

        .row-2 {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }
        .row-2 .label {
            font-size: 10px;
            color: #8a8aaa;
            flex-shrink: 0;
        }
        #palette {
            display: flex;
            gap: 4px;
            align-items: center;
            flex-wrap: wrap;
        }
        .color-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            flex-shrink: 0;
            touch-action: manipulation;
        }
        .color-btn:active { transform: scale(1.2); }
        .color-btn.active { border-color: #fff; box-shadow: 0 0 12px rgba(255,255,255,0.3); }

        .row-3 {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .row-3 .label {
            font-size: 10px;
            color: #8a8aaa;
            flex-shrink: 0;
        }
        .size-group {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
        }
        #sizeSlider {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: #2a2a3e;
            border-radius: 4px;
            outline: none;
            touch-action: manipulation;
            min-width: 40px;
        }
        #sizeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00ff88;
            cursor: pointer;
            touch-action: manipulation;
        }
        #sizeSlider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00ff88;
            cursor: pointer;
            border: none;
        }
        #sizeLabel {
            font-size: 11px;
            color: #8a8aaa;
            min-width: 30px;
            text-align: center;
            flex-shrink: 0;
        }
        #clearBtn {
            background: #ff3366;
            border: none;
            color: #fff;
            padding: 4px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            flex-shrink: 0;
            min-height: 28px;
            touch-action: manipulation;
        }
        #clearBtn:active { transform: scale(0.9); }

        /* ===== ОСНОВНАЯ ЧАСТЬ ===== */
        .main-area {
            display: flex;
            flex: 1;
            min-height: 0;
            height: 100%;
            touch-action: none;
        }
        .canvas-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            background: #0a0a0f;
            position: relative;
            min-height: 0;
            height: 100%;
            overflow: hidden;
            touch-action: none;
        }
        #canvas {
            border-radius: 8px;
            cursor: crosshair;
            background: #fff;
            touch-action: none;
            display: block;
            width: 100%;
            height: 100%;
            aspect-ratio: 1 / 1;
            object-fit: contain;
        }

        /* ===== ЧАТ ===== */
        .chat-panel {
            width: 140px;
            min-width: 100px;
            background: #1a1a2e;
            border-left: 1px solid #2a2a3e;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            height: 100%;
        }
        .chat-panel .chat-header {
            padding: 4px 8px;
            border-bottom: 1px solid #2a2a3e;
            font-size: 10px;
            font-weight: 600;
            color: #8a8aaa;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-panel .chat-header span { color: #00ff88; }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 4px 6px;
            font-size: 11px;
            line-height: 1.4;
            min-height: 0;
        }
        .chat-messages::-webkit-scrollbar { width: 2px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #00ff88; border-radius: 2px; }
        .chat-messages .me { color: #00ff88; }
        .chat-messages .other { color: #ff6688; }
        .chat-messages .system { color: #ffaa44; font-style: italic; font-size: 10px; }

        .chat-input-row {
            display: flex;
            gap: 3px;
            padding: 4px 6px 8px;
            border-top: 1px solid #2a2a3e;
            flex-shrink: 0;
        }
        .chat-input-row input {
            flex: 1;
            padding: 4px 8px;
            background: #0a0a0f;
            border: 1px solid #2a2a3e;
            border-radius: 12px;
            color: #fff;
            font-size: 11px;
            outline: none;
            min-width: 0;
        }
        .chat-input-row input:focus { border-color: #00ff88; }
        .chat-input-row input:disabled { opacity: 0.4; cursor: not-allowed; }
        .chat-input-row button {
            padding: 4px 10px;
            background: #00ff88;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            color: #000;
            cursor: pointer;
            font-size: 11px;
            flex-shrink: 0;
            min-height: 28px;
        }
        .chat-input-row button:active { transform: scale(0.92); }
        .chat-input-row button:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ===== ТЕЛЕФОН — 3 СТРОКИ ===== */
        @media (max-width: 600px) {
            .top-panel {
                display: block !important;
                padding: 6px 8px !important;
            }
            .row-1, .row-2, .row-3 {
                display: flex !important;
                flex-wrap: wrap !important;
                gap: 4px !important;
                margin-bottom: 4px !important;
                width: 100% !important;
            }
            .row-2 .label, .row-3 .label {
                display: none !important;
            }
            #palette {
                flex-wrap: wrap !important;
                gap: 4px !important;
            }
            .color-btn {
                width: 20px !important;
                height: 20px !important;
            }
            #sizeSlider {
                flex: 1 !important;
                min-width: 60px !important;
            }
            #clearBtn {
                padding: 4px 12px !important;
                font-size: 12px !important;
                min-height: 28px !important;
            }
            .row-1 input {
                font-size: 10px !important;
                padding: 3px 5px !important;
                width: 44px !important;
            }
            .row-1 button {
                font-size: 10px !important;
                padding: 3px 8px !important;
                min-height: 28px !important;
            }
            .row-1 .logo-small { font-size: 14px !important; }
            .row-1 .user-name { font-size: 10px !important; }
            .row-1 #roomDisplay { font-size: 10px !important; min-width: 30px !important; }
            .row-1 #onlineCount { font-size: 9px !important; }
            .row-1 #statusText { font-size: 9px !important; }
            .row-1 .sep { font-size: 14px !important; }
            #sizeLabel { font-size: 10px !important; min-width: 24px !important; }
            .chat-panel {
                width: 100px !important;
                min-width: 70px !important;
            }
            .chat-messages { font-size: 9px !important; padding: 3px 4px !important; }
            .chat-input-row input { font-size: 9px !important; padding: 3px 6px !important; }
            .chat-input-row button { font-size: 9px !important; padding: 3px 8px !important; min-height: 24px !important; }
            .chat-panel .chat-header { font-size: 8px !important; padding: 3px 5px !important; }
        }

        @media (max-width: 400px) {
            .chat-panel {
                width: 70px !important;
                min-width: 55px !important;
            }
            .row-1 input {
                width: 36px !important;
                font-size: 9px !important;
            }
            .row-1 button {
                font-size: 9px !important;
                padding: 2px 6px !important;
                min-height: 20px !important;
            }
            .row-1 .logo-small { font-size: 12px !important; }
            .row-1 .user-name { font-size: 9px !important; }
            .color-btn {
                width: 18px !important;
                height: 18px !important;
            }
            #sizeLabel { font-size: 9px !important; min-width: 20px !important; }
            #clearBtn {
                font-size: 10px !important;
                padding: 2px 8px !important;
                min-height: 20px !important;
            }
            .chat-panel .chat-header { font-size: 7px !important; padding: 2px 4px !important; }
            .chat-messages { font-size: 8px !important; padding: 2px 3px !important; }
            .chat-input-row input { font-size: 8px !important; padding: 2px 4px !important; }
            .chat-input-row button { font-size: 8px !important; padding: 2px 6px !important; min-height: 20px !important; }
        }
    </style>
</head>
<body>
    <div id="auth">
        <div class="logo">🎨</div>
        <div class="sub">Введи имя и входи</div>
        <input class="field" id="authUsername" placeholder="Твоё имя" inputmode="text">
        <button class="btn" id="authBtn">🚀 Войти</button>
        <div id="authStatus"></div>
        <input class="field" id="serverInput" placeholder="Сервер" value="risovaluka-risovaluka.up.railway.app" style="margin-top:12px;font-size:14px;">
    </div>

    <div id="main">
        <div class="top-panel">
            <div class="row-1">
                <span class="logo-small">🎨</span>
                <span class="user-name" id="userNameDisplay">—</span>
                <span class="sep">|</span>
                <input id="roomInput" placeholder="ID" maxlength="10" inputmode="text">
                <button id="createBtn">🏠 Создать</button>
                <button id="joinBtn">🔗 Войти</button>
                <button id="leaveBtn">🚪 Выйти</button>
                <span class="sep">|</span>
                <span id="roomDisplay">Нет</span>
                <span id="onlineCount">👤0</span>
                <span id="statusText">✏️</span>
            </div>

            <div class="row-2">
                <span class="label">Цвет:</span>
                <div id="palette"></div>
            </div>

            <div class="row-3">
                <span class="label">Размер:</span>
                <div class="size-group">
                    <input type="range" id="sizeSlider" min="1" max="20" value="3">
                    <span id="sizeLabel">3px</span>
                </div>
                <button id="clearBtn">🗑️ Очистить</button>
            </div>
        </div>

        <div class="main-area">
            <div class="canvas-wrapper">
                <canvas id="canvas"></canvas>
            </div>
            <div class="chat-panel">
                <div class="chat-header"><span>💬</span><span id="chatUserCount">0</span></div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-row">
                    <input id="chatInput" placeholder="..." disabled inputmode="text">
                    <button id="chatSend" disabled>📨</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. КАНВАС
        // ==========================================
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let isDrawing = false;
        let lastX = 0,
            lastY = 0;
        let currentColor = '#ff3366';
        let brushSize = 3;
        let username = '';
        let currentRoom = null;
        let roomUsers = [];
        let hasDrawn = false;
        let ws = null;
        let connected = false;
        let pingInterval = null;

        // ==========================================
        // 2. РЕСАЙЗ
        // ==========================================
        function resizeCanvas() {
            const wrapper = document.querySelector('.canvas-wrapper');
            const rect = wrapper.getBoundingClientRect();
            const size = Math.min(rect.width, rect.height) - 10;
            canvas.width = Math.max(200, size);
            canvas.height = Math.max(200, size);
            canvas.style.width = canvas.width + 'px';
            canvas.style.height = canvas.height + 'px';

            if (!hasDrawn) {
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ddd';
                ctx.font = Math.min(canvas.width, canvas.height) * 0.04 + 'px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('🎨 Рисовалка', canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = Math.min(canvas.width, canvas.height) * 0.025 + 'px Arial';
                ctx.fillStyle = '#aaa';
                ctx.fillText('Создай комнату и рисуй', canvas.width / 2, canvas.height / 2 + 30);
                ctx.textAlign = 'start';
            }
        }

        window.addEventListener('resize', resizeCanvas);

        // ==========================================
        // 3. ПАЛИТРА
        // ==========================================
        const colors = [
            '#ff3366', '#ff6633', '#ffcc00', '#33ff66',
            '#33ccff', '#3366ff', '#9933ff', '#ff33cc',
            '#ffffff', '#cccccc', '#888888', '#333333'
        ];

        function createPalette() {
            const palette = document.getElementById('palette');
            palette.innerHTML = '';
            colors.forEach(color => {
                const btn = document.createElement('div');
                btn.className = 'color-btn' + (color === currentColor ? ' active' : '');
                btn.style.background = color;
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentColor = color;
                });
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentColor = color;
                }, { passive: true });
                palette.appendChild(btn);
            });
        }

        // ==========================================
        // 4. РАЗМЕР
        // ==========================================
        const sizeSlider = document.getElementById('sizeSlider');
        const sizeLabel = document.getElementById('sizeLabel');

        function updateBrushSize() {
            brushSize = parseInt(sizeSlider.value);
            sizeLabel.textContent = brushSize + 'px';
        }

        sizeSlider.addEventListener('input', updateBrushSize);

        // ==========================================
        // 5. КООРДИНАТЫ
        // ==========================================
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            const x = ((clientX - rect.left) / rect.width) * 100;
            const y = ((clientY - rect.top) / rect.height) * 100;
            return { x: Math.min(100, Math.max(0, x)), y: Math.min(100, Math.max(0, y)) };
        }

        // ==========================================
        // 6. РИСОВАНИЕ
        // ==========================================
        function startDrawing(e) {
            e.preventDefault();
            if (!currentRoom || !connected) return;
            isDrawing = true;
            const pos = getPos(e);
            lastX = pos.x;
            lastY = pos.y;
        }

        function draw(e) {
            e.preventDefault();
            if (!isDrawing || !currentRoom || !connected) return;
            const pos = getPos(e);

            const scale = Math.min(canvas.width, canvas.height) / 800;
            const scaledSize = Math.max(1, brushSize * scale);

            const x1 = (lastX / 100) * canvas.width;
            const y1 = (lastY / 100) * canvas.height;
            const x2 = (pos.x / 100) * canvas.width;
            const y2 = (pos.y / 100) * canvas.height;

            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = scaledSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
            hasDrawn = true;

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'draw',
                    room: currentRoom,
                    x1: lastX, y1: lastY,
                    x2: pos.x, y2: pos.y,
                    color: currentColor,
                    size: brushSize
                }));
            }

            lastX = pos.x;
            lastY = pos.y;
        }

        function stopDrawing() { isDrawing = false; }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        document.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        document.addEventListener('touchend', stopDrawing, { passive: true });

        // ==========================================
        // 7. ОЧИСТКА
        // ==========================================
        document.getElementById('clearBtn').addEventListener('click', () => {
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            hasDrawn = false;
            if (ws && ws.readyState === WebSocket.OPEN && currentRoom) {
                ws.send(JSON.stringify({ type: 'clear', room: currentRoom }));
            }
        });
        document.getElementById('clearBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            hasDrawn = false;
            if (ws && ws.readyState === WebSocket.OPEN && currentRoom) {
                ws.send(JSON.stringify({ type: 'clear', room: currentRoom }));
            }
        }, { passive: true });

        // ==========================================
        // 8. ЧАТ
        // ==========================================
        function addChatMessage(text, className = 'system') {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = className;
            div.textContent = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            if (container.children.length > 100) container.removeChild(container.firstChild);
        }

        document.getElementById('chatSend').addEventListener('click', sendChat);
        document.getElementById('chatInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendChat();
        });

        function sendChat() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text || !currentRoom || !ws || ws.readyState !== WebSocket.OPEN) return;
            addChatMessage('💬 Я: ' + text, 'me');
            ws.send(JSON.stringify({ type: 'chat', room: currentRoom, text: text }));
            input.value = '';
        }

        // ==========================================
        // 9. ВЕБСОКЕТ
        // ==========================================
        function connectWebSocket(addr) {
            return new Promise((resolve, reject) => {
                try {
                    let protocol = 'wss://';
                    if (addr.includes('localhost') || addr.includes('127.0.0.1') || addr.includes('192.168.')) {
                        protocol = 'ws://';
                    }
                    const wsUrl = protocol + addr;
                    console.log('🔗 Подключение к:', wsUrl);
                    ws = new WebSocket(wsUrl);
                    ws.onopen = () => {
                        console.log('🟢 WebSocket подключен');
                        if (pingInterval) clearInterval(pingInterval);
                        pingInterval = setInterval(() => {
                            if (ws && ws.readyState === WebSocket.OPEN) {
                                ws.send(JSON.stringify({ type: 'ping' }));
                            }
                        }, 10000);
                        resolve();
                    };
                    ws.onerror = (err) => {
                        console.log('🔴 WebSocket ошибка:', err);
                        reject(err);
                    };
                    ws.onclose = () => {
                        connected = false;
                        setStatus('❌', '#ff3366');
                        if (pingInterval) clearInterval(pingInterval);
                        pingInterval = null;
                        console.log('🔴 WebSocket закрыт');
                    };
                    ws.onmessage = (e) => {
                        try { handleMessage(JSON.parse(e.data)); } catch (err) { console.log('Parse error:', err); }
                    };
                } catch (e) { reject(e); }
            });
        }

        function handleMessage(data) {
            switch (data.type) {
                case 'connected':
                    connected = true;
                    setStatus('✅', '#00ff88');
                    document.getElementById('userNameDisplay').textContent = username;
                    document.getElementById('auth').style.display = 'none';
                    document.getElementById('main').style.display = 'flex';
                    document.getElementById('onlineCount').textContent = '👤1';
                    createPalette();
                    setTimeout(resizeCanvas, 50);
                    break;

                case 'error':
                    setStatus('❌ ' + data.message, '#ff3366');
                    break;

                case 'room_created':
                case 'room_joined':
                    currentRoom = data.room_id;
                    roomUsers = data.users || [];
                    if (!roomUsers.includes(username)) roomUsers.push(username);
                    document.getElementById('roomDisplay').textContent = '🏠' + currentRoom;
                    document.getElementById('roomDisplay').className = 'active';
                    document.getElementById('leaveBtn').style.display = 'inline-block';
                    document.getElementById('chatInput').disabled = false;
                    document.getElementById('chatSend').disabled = false;
                    document.getElementById('chatUserCount').textContent = roomUsers.length;
                    document.getElementById('onlineCount').textContent = '👤' + roomUsers.length;
                    setStatus('🎨', '#00ff88');
                    break;

                case 'room_left':
                    currentRoom = null;
                    roomUsers = [];
                    document.getElementById('roomDisplay').textContent = 'Нет';
                    document.getElementById('roomDisplay').className = '';
                    document.getElementById('leaveBtn').style.display = 'none';
                    document.getElementById('chatInput').disabled = true;
                    document.getElementById('chatSend').disabled = true;
                    document.getElementById('chatUserCount').textContent = '0';
                    document.getElementById('onlineCount').textContent = '👤0';
                    setStatus('✏️', '#8a8aaa');
                    break;

                case 'user_joined':
                case 'user_left':
                    roomUsers = data.users || [];
                    if (currentRoom && !roomUsers.includes(username)) roomUsers.push(username);
                    document.getElementById('chatUserCount').textContent = roomUsers.length;
                    document.getElementById('onlineCount').textContent = '👤' + roomUsers.length;
                    addChatMessage('🔄 ' + data.username + (data.type === 'user_joined' ? ' присоединился' : ' вышел'), 'system');
                    break;

                case 'draw':
                    const scale = Math.min(canvas.width, canvas.height) / 800;
                    const scaledSize = Math.max(1, data.size * scale);
                    const x1 = (data.x1 / 100) * canvas.width;
                    const y1 = (data.y1 / 100) * canvas.height;
                    const x2 = (data.x2 / 100) * canvas.width;
                    const y2 = (data.y2 / 100) * canvas.height;
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.strokeStyle = data.color;
                    ctx.lineWidth = scaledSize;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.stroke();
                    hasDrawn = true;
                    break;

                case 'clear':
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    hasDrawn = false;
                    addChatMessage('🗑️ ' + data.from + ' очистил холст', 'system');
                    break;

                case 'chat':
                    addChatMessage('💬 ' + data.from + ': ' + data.text, data.from === username ? 'me' : 'other');
                    break;

                case 'room_update':
                    roomUsers = data.users || [];
                    if (currentRoom && !roomUsers.includes(username)) roomUsers.push(username);
                    document.getElementById('chatUserCount').textContent = roomUsers.length;
                    document.getElementById('onlineCount').textContent = '👤' + roomUsers.length;
                    break;

                case 'pong':
                    break;
            }
        }

        function setStatus(text, color = '#8a8aaa') {
            document.getElementById('statusText').textContent = text;
            document.getElementById('statusText').style.color = color;
        }

        // ==========================================
        // 10. АВТОРИЗАЦИЯ
        // ==========================================
        document.getElementById('authBtn').addEventListener('click', async () => {
            const name = document.getElementById('authUsername').value.trim();
            if (!name) { document.getElementById('authStatus').textContent = 'Введи имя!'; return; }
            username = name;
            const server = document.getElementById('serverInput').value.trim() || 'risovaluka-risovaluka.up.railway.app';
            document.getElementById('authStatus').textContent = 'Подключение...';
            document.getElementById('authBtn').disabled = true;
            try {
                await connectWebSocket(server);
                ws.send(JSON.stringify({ type: 'join', username: username }));
                document.getElementById('authBtn').disabled = false;
            } catch (e) {
                document.getElementById('authStatus').textContent = '❌ ' + e.message;
                document.getElementById('authBtn').disabled = false;
            }
        });

        document.getElementById('authUsername').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('authBtn').click();
        });

        // ==========================================
        // 11. КОМНАТЫ
        // ==========================================
        document.getElementById('createBtn').addEventListener('click', () => {
            const roomId = document.getElementById('roomInput').value.trim().toUpperCase();
            if (!roomId) { alert('Введите ID!'); return; }
            if (!ws || ws.readyState !== WebSocket.OPEN) { alert('Нет соединения!'); return; }
            ws.send(JSON.stringify({ type: 'create_room', room_id: roomId }));
        });

        document.getElementById('joinBtn').addEventListener('click', () => {
            const roomId = document.getElementById('roomInput').value.trim().toUpperCase();
            if (!roomId) { alert('Введите ID!'); return; }
            if (!ws || ws.readyState !== WebSocket.OPEN) { alert('Нет соединения!'); return; }
            ws.send(JSON.stringify({ type: 'join_room', room_id: roomId }));
        });

        document.getElementById('leaveBtn').addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN && currentRoom) {
                ws.send(JSON.stringify({ type: 'leave_room' }));
            }
        });

        document.getElementById('roomInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('createBtn').click();
        });

        // ==========================================
        // 12. ЗАПУСК
        // ==========================================
        setTimeout(resizeCanvas, 100);
        console.log('🎨 Рисовалка запущена!');
        console.log('🌐 Адрес: risovaluka-risovaluka.up.railway.app');
        console.log('📱 Телефон — 3 строки меню!');
    </script>
</body>
</html>
